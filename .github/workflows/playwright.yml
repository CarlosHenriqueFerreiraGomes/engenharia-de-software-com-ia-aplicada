name: Playwright tests

on:
  push:
  pull_request:

jobs:
  playwright:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: modulo01-fundamentos-de-ia-e-llms-para-programadores/exemplo-06-playwright-testes
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm test
      - if: failure()
        uses: actions/upload-artifact@v3
        with:
          name: playwright-report
          path: ${{ github.workspace }}/modulo01-fundamentos-de-ia-e-llms-para-programadores/exemplo-06-playwright-testes/playwright-report
